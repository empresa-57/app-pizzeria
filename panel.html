<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Pedidos — Cocina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --carbon:#1b1815;
    --carbon-2:#242019;
    --masa:#f2e9d8;
    --tomate:#c8402c;
    --queso:#e8b04b;
    --albahaca:#5f7a4f;
    --azul:#4a7ba6;
    --linea: rgba(242,233,216,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--carbon);
    color:var(--masa);
    font-family:'Inter',sans-serif;
    padding:24px;
  }
  header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:24px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-size:26px;
    margin:0;
  }
  .estado-conexion{
    font-size:12.5px;
    color:rgba(242,233,216,0.5);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .dot{
    width:8px; height:8px;
    border-radius:50%;
    background:var(--albahaca);
  }
  .columnas{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:16px;
  }
  @media(max-width:1000px){
    .columnas{ grid-template-columns:repeat(2,1fr); }
  }
  @media(max-width:600px){
    .columnas{ grid-template-columns:1fr; }
  }
  .columna{
    background:var(--carbon-2);
    border-radius:14px;
    padding:14px;
    min-height:200px;
  }
  .col-titulo{
    font-weight:700;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    margin-bottom:12px;
    padding-bottom:10px;
    border-bottom:2px solid var(--col-color, var(--linea));
    display:flex;
    justify-content:space-between;
  }
  .col-nuevo .col-titulo{ --col-color: var(--tomate); color:var(--tomate); }
  .col-preparando .col-titulo{ --col-color: var(--queso); color:var(--queso); }
  .col-listo .col-titulo{ --col-color: var(--azul); color:var(--azul); }
  .col-entregado .col-titulo{ --col-color: var(--albahaca); color:var(--albahaca); }

  .card{
    background:var(--carbon);
    border:1px solid var(--linea);
    border-radius:11px;
    padding:12px;
    margin-bottom:10px;
  }
  .card-top{
    display:flex;
    justify-content:space-between;
    font-weight:700;
    font-size:14px;
    margin-bottom:4px;
  }
  .card-hora{
    font-size:11.5px;
    color:rgba(242,233,216,0.45);
    font-weight:500;
  }
  .card-items{
    font-size:12.5px;
    color:rgba(242,233,216,0.75);
    margin:8px 0;
    line-height:1.5;
  }
  .card-items div{ margin-bottom:3px; }
  .card-direccion{
    font-size:12px;
    color:rgba(242,233,216,0.55);
    margin-bottom:8px;
  }
  .card-total{
    font-weight:700;
    color:var(--queso);
    font-size:14px;
    margin-bottom:10px;
  }
  .card-pago{
    display:inline-block;
    font-size:10.5px;
    background:rgba(242,233,216,0.08);
    padding:2px 7px;
    border-radius:5px;
    margin-left:6px;
    text-transform:uppercase;
    font-weight:600;
    color:rgba(242,233,216,0.6);
  }
  .card-botones{
    display:flex;
    gap:6px;
  }
  .card-botones button{
    flex:1;
    background:rgba(242,233,216,0.08);
    border:1px solid var(--linea);
    color:var(--masa);
    border-radius:8px;
    padding:8px 6px;
    font-size:11.5px;
    font-weight:600;
    cursor:pointer;
  }
  .card-botones button:hover{ background:rgba(242,233,216,0.15); }
  .vacio{
    color:rgba(242,233,216,0.3);
    font-size:12.5px;
    text-align:center;
    padding:30px 0;
  }

  .toggle-negocio{
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--carbon-2);
    border:1px solid var(--linea);
    border-radius:12px;
    padding:10px 16px;
  }
  .toggle-negocio .estado-texto{
    font-weight:700;
    font-size:13.5px;
  }
  .toggle-negocio.abierto .estado-texto{ color:var(--albahaca); }
  .toggle-negocio.cerrado .estado-texto{ color:var(--tomate); }

  .switch{
    position:relative;
    width:46px;
    height:26px;
    background:rgba(242,233,216,0.15);
    border-radius:999px;
    cursor:pointer;
    transition:background .2s ease;
    border:none;
    flex-shrink:0;
  }
  .switch::after{
    content:"";
    position:absolute;
    top:3px; left:3px;
    width:20px; height:20px;
    background:var(--masa);
    border-radius:50%;
    transition:transform .2s ease;
  }
  .switch.on{ background:var(--albahaca); }
  .switch.on::after{ transform:translateX(20px); }

  /* Chat flotante del negocio */
  #chat-btn{
    position:fixed;
    right:22px;
    bottom:22px;
    width:58px; height:58px;
    border-radius:50%;
    background:var(--tomate);
    border:none;
    color:white;
    font-size:24px;
    cursor:pointer;
    box-shadow:0 6px 20px rgba(0,0,0,0.4);
    z-index:25;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #chat-btn .badge{
    position:absolute;
    top:-2px; right:-2px;
    background:var(--queso);
    color:var(--carbon);
    font-size:11px;
    font-weight:800;
    width:21px; height:21px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    border:2px solid var(--carbon);
  }
  #chat-btn .badge.oculto{ display:none; }

  #chat-overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:40;
  }
  #chat-overlay.show{ display:flex; }
  #chat-panel{
    background:var(--carbon-2);
    width:100%;
    max-width:820px;
    height:80vh;
    border-radius:16px;
    border:1px solid var(--linea);
    display:flex;
    overflow:hidden;
  }
  #chat-lista{
    width:260px;
    border-right:1px solid var(--linea);
    overflow-y:auto;
    flex-shrink:0;
  }
  #chat-lista-header{
    padding:14px 16px;
    border-bottom:1px solid var(--linea);
    font-family:'Fraunces',serif;
    font-size:16px;
    font-weight:700;
  }
  .conv-item{
    padding:12px 16px;
    border-bottom:1px solid var(--linea);
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .conv-item:hover{ background:rgba(242,233,216,0.05); }
  .conv-item.activa{ background:rgba(200,64,44,0.12); }
  .conv-nombre{ font-size:13.5px; font-weight:600; }
  .conv-fecha{ font-size:11px; color:rgba(242,233,216,0.4); margin-top:2px; }
  .conv-badge{
    background:var(--tomate);
    color:white;
    font-size:10.5px;
    font-weight:800;
    min-width:18px;
    height:18px;
    border-radius:9px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 5px;
  }
  #chat-vacio-lista{
    padding:24px 16px;
    color:rgba(242,233,216,0.35);
    font-size:12.5px;
    text-align:center;
  }
  #chat-thread{
    flex:1;
    display:flex;
    flex-direction:column;
  }
  #chat-thread-header{
    padding:14px 18px;
    border-bottom:1px solid var(--linea);
    font-weight:700;
    font-size:14px;
  }
  #chat-thread-mensajes{
    flex:1;
    overflow-y:auto;
    padding:16px 18px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .msg{
    max-width:70%;
    padding:9px 13px;
    border-radius:14px;
    font-size:13.5px;
    line-height:1.4;
  }
  .msg-cliente{
    align-self:flex-start;
    background:rgba(242,233,216,0.08);
    border-bottom-left-radius:4px;
  }
  .msg-negocio{
    align-self:flex-end;
    background:var(--tomate);
    color:white;
    border-bottom-right-radius:4px;
  }
  .msg-hora{ font-size:10px; opacity:0.6; margin-top:3px; }
  #chat-sin-seleccion{
    margin:auto;
    color:rgba(242,233,216,0.35);
    font-size:13px;
  }
  #chat-thread-input-fila{
    display:flex;
    gap:8px;
    padding:12px 16px;
    border-top:1px solid var(--linea);
  }
  #chat-thread-input{
    flex:1;
    background:var(--carbon);
    border:1px solid var(--linea);
    color:var(--masa);
    border-radius:10px;
    padding:10px 12px;
    font-size:13.5px;
    font-family:inherit;
  }
  #chat-thread-enviar{
    background:var(--tomate);
    color:white;
    border:none;
    border-radius:10px;
    padding:0 16px;
    font-weight:700;
    cursor:pointer;
  }
  .cerrar-chat-panel{
    background:none;
    border:none;
    color:rgba(242,233,216,0.5);
    font-size:20px;
    cursor:pointer;
  }

  /* Botón y panel de gestión del menú */
  #menu-admin-btn{
    position:fixed;
    right:92px;
    bottom:22px;
    width:58px; height:58px;
    border-radius:50%;
    background:var(--albahaca);
    border:none;
    color:white;
    font-size:22px;
    cursor:pointer;
    box-shadow:0 6px 20px rgba(0,0,0,0.4);
    z-index:25;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #menu-admin-overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:40;
  }
  #menu-admin-overlay.show{ display:flex; }
  #menu-admin-panel{
    background:var(--carbon-2);
    width:100%;
    max-width:640px;
    height:82vh;
    border-radius:16px;
    border:1px solid var(--linea);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  #menu-admin-header{
    padding:14px 18px;
    border-bottom:1px solid var(--linea);
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:'Fraunces',serif;
    font-size:17px;
    font-weight:700;
  }
  .menu-admin-tabs{
    display:flex;
    border-bottom:1px solid var(--linea);
  }
  .menu-admin-tab{
    flex:1;
    text-align:center;
    padding:11px;
    font-size:13px;
    font-weight:600;
    color:rgba(242,233,216,0.5);
    cursor:pointer;
    border-bottom:2px solid transparent;
  }
  .menu-admin-tab.activa{
    color:var(--masa);
    border-bottom-color:var(--tomate);
  }
  #menu-admin-lista{
    flex:1;
    overflow-y:auto;
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .pizza-admin-card{
    background:var(--carbon);
    border:1px solid var(--linea);
    border-radius:12px;
    padding:14px;
    display:flex;
    gap:12px;
  }
  .pizza-admin-foto{
    width:80px; height:80px;
    border-radius:9px;
    object-fit:cover;
    background:rgba(242,233,216,0.06);
    flex-shrink:0;
  }
  .pizza-admin-foto-vacia{
    width:80px; height:80px;
    border-radius:9px;
    background:rgba(242,233,216,0.06);
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    color:rgba(242,233,216,0.3);
    text-align:center;
  }
  .pizza-admin-campos{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .pizza-admin-fila{
    display:flex;
    gap:6px;
  }
  .pizza-admin-campos input[type="text"],
  .pizza-admin-campos input[type="number"],
  .pizza-admin-campos textarea{
    background:var(--carbon-2);
    border:1px solid var(--linea);
    color:var(--masa);
    border-radius:7px;
    padding:6px 8px;
    font-size:12.5px;
    font-family:inherit;
    width:100%;
  }
  .pizza-admin-campos input[type="number"]{ width:80px; flex:none; }
  .pizza-admin-acciones{
    display:flex;
    gap:6px;
    align-items:center;
    margin-top:4px;
  }
  .pizza-admin-acciones label{
    font-size:11px;
    color:rgba(242,233,216,0.5);
    display:flex;
    align-items:center;
    gap:4px;
    cursor:pointer;
  }
  .btn-mini{
    background:rgba(242,233,216,0.08);
    border:1px solid var(--linea);
    color:var(--masa);
    border-radius:7px;
    padding:5px 10px;
    font-size:11.5px;
    font-weight:600;
    cursor:pointer;
  }
  .btn-mini.guardar{ background:var(--albahaca); border-color:var(--albahaca); }
  .btn-mini.borrar{ background:transparent; color:var(--tomate-2); border-color:rgba(200,64,44,0.4); }
  .btn-mini.subir-foto{ background:var(--azul); border-color:var(--azul); }
  #menu-admin-agregar{
    margin:0 16px 16px;
    background:var(--tomate);
    color:white;
    border:none;
    border-radius:10px;
    padding:12px;
    font-weight:700;
    cursor:pointer;
  }
</style>
</head>
<body>

<header>
  <h1>🍕 Panel de Pedidos</h1>
  <div style="display:flex; align-items:center; gap:16px;">
    <div class="estado-conexion"><span class="dot"></span> Conectado en tiempo real</div>
    <div class="toggle-negocio" id="toggle-negocio">
      <span class="estado-texto" id="estado-texto">Cargando...</span>
      <button class="switch" id="switch-btn" onclick="toggleNegocio()"></button>
    </div>
  </div>
</header>

<div class="columnas">
  <div class="columna col-nuevo">
    <div class="col-titulo">Nuevo <span id="count-nuevo">0</span></div>
    <div id="lista-nuevo"></div>
  </div>
  <div class="columna col-preparando">
    <div class="col-titulo">Preparando <span id="count-preparando">0</span></div>
    <div id="lista-preparando"></div>
  </div>
  <div class="columna col-listo">
    <div class="col-titulo">Listo <span id="count-listo">0</span></div>
    <div id="lista-listo"></div>
  </div>
  <div class="columna col-entregado">
    <div class="col-titulo">Entregado hoy <span id="count-entregado">0</span></div>
    <div id="lista-entregado"></div>
  </div>
</div>

<button id="menu-admin-btn" onclick="abrirMenuAdmin()" title="Gestionar menú">🍕</button>

<div id="menu-admin-overlay">
  <div id="menu-admin-panel">
    <div id="menu-admin-header">
      Gestionar menú
      <button class="cerrar-chat-panel" onclick="cerrarMenuAdmin()">×</button>
    </div>
    <div class="menu-admin-tabs">
      <div class="menu-admin-tab activa" id="tab-pizzas" onclick="cambiarTabMenuAdmin('pizzas')">🍕 Pizzas</div>
      <div class="menu-admin-tab" id="tab-bebidas" onclick="cambiarTabMenuAdmin('bebidas')">🥤 Bebidas</div>
    </div>
    <div id="menu-admin-lista"></div>
    <button id="menu-admin-agregar" onclick="agregarItemNuevo()">+ Agregar</button>
  </div>
</div>

<button id="chat-btn" onclick="abrirChatPanel()">
  💬
  <span class="badge oculto" id="chat-btn-badge">0</span>
</button>

<div id="chat-overlay">
  <div id="chat-panel">
    <div id="chat-lista">
      <div id="chat-lista-header" style="display:flex; justify-content:space-between; align-items:center;">
        Conversaciones
        <button class="cerrar-chat-panel" onclick="cerrarChatPanel()">×</button>
      </div>
      <div id="chat-lista-items"></div>
    </div>
    <div id="chat-thread">
      <div id="chat-sin-seleccion">Selecciona una conversación</div>
    </div>
  </div>
</div>

<script>
/* ===================== CONFIGURA AQUÍ ===================== */
const SUPABASE_URL = "https://aaaiqcboaqyxxoscbunp.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_qQGo5_2DXjzsg9_yiNd1lA_QTjypFdA";
/* ============================================================ */

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const SIGUIENTE_ESTADO = {
  nuevo: "preparando",
  preparando: "listo",
  listo: "entregado"
};
const TEXTO_BOTON = {
  nuevo: "Empezar a preparar →",
  preparando: "Marcar como listo →",
  listo: "Marcar como entregado →"
};

function money(n){
  return "$" + Number(n).toLocaleString("es-CO");
}
function hora(iso){
  return new Date(iso).toLocaleTimeString("es-CO", { hour:"2-digit", minute:"2-digit" });
}

function renderTarjeta(pedido){
  const itemsHtml = pedido.items.map(i =>
    i.tipo === "bebida"
      ? `<div>• ${i.nombre} x${i.cantidad}</div>`
      : `<div>• ${i.pizza} (${i.tamano})${i.cantidad > 1 ? " x" + i.cantidad : ""}</div>`
  ).join("");

  const siguienteEstado = SIGUIENTE_ESTADO[pedido.estado];
  const botonEstado = siguienteEstado
    ? `<button onclick="cambiarEstado(${pedido.id}, '${siguienteEstado}')">${TEXTO_BOTON[pedido.estado]}</button>`
    : "";
  const botonChat = pedido.conversacion_id
    ? `<button onclick="abrirConversacionDesdeChatPanel('${pedido.conversacion_id}')">💬 Escribirle</button>`
    : "";

  return `
    <div class="card">
      <div class="card-top">
        <span>${pedido.cliente_nombre}</span>
        <span class="card-hora">${hora(pedido.creado_en)}</span>
      </div>
      <div class="card-items">${itemsHtml}</div>
      <div class="card-direccion">📍 ${pedido.cliente_direccion} · ${pedido.cliente_telefono}</div>
      <div class="card-total">${money(pedido.total)}<span class="card-pago">${pedido.metodo_pago}</span></div>
      ${pedido.notas ? `<div class="card-direccion">📝 ${pedido.notas}</div>` : ""}
      <div class="card-botones">
        ${botonEstado}
        ${botonChat}
      </div>
    </div>
  `;
}

async function cambiarEstado(id, nuevoEstado){
  await supabaseClient.from("pedidos").update({ estado: nuevoEstado }).eq("id", id);
  cargarPedidos();
}

async function cargarPedidos(){
  const hoyInicio = new Date();
  hoyInicio.setHours(0,0,0,0);

  const { data, error } = await supabaseClient
    .from("pedidos")
    .select("*")
    .gte("creado_en", hoyInicio.toISOString())
    .order("creado_en", { ascending: true });

  if(error){ console.error(error); return; }

  const grupos = { nuevo:[], preparando:[], listo:[], entregado:[] };
  data.forEach(p => { if(grupos[p.estado]) grupos[p.estado].push(p); });

  for(const estado of Object.keys(grupos)){
    const lista = grupos[estado];
    document.getElementById(`count-${estado}`).textContent = lista.length;
    document.getElementById(`lista-${estado}`).innerHTML =
      lista.length ? lista.map(renderTarjeta).join("") : `<div class="vacio">Sin pedidos</div>`;
  }
}

// Carga inicial
cargarPedidos();

// Suscripción en tiempo real: se actualiza solo cuando llega o cambia un pedido
supabaseClient
  .channel("pedidos-realtime")
  .on("postgres_changes", { event: "*", schema: "public", table: "pedidos" }, () => {
    cargarPedidos();
  })
  .subscribe();

/* ===================== Abierto / Cerrado ===================== */

function renderToggle(abierto){
  const cont = document.getElementById("toggle-negocio");
  const texto = document.getElementById("estado-texto");
  const btn = document.getElementById("switch-btn");

  cont.classList.toggle("abierto", abierto);
  cont.classList.toggle("cerrado", !abierto);
  texto.textContent = abierto ? "Recibiendo pedidos" : "Pedidos cerrados";
  btn.classList.toggle("on", abierto);
}

async function cargarConfig(){
  const { data, error } = await supabaseClient.from("config").select("abierto").eq("id", 1).single();
  if(error){ console.error(error); return; }
  renderToggle(data.abierto);
}

async function toggleNegocio(){
  const estaAbierto = document.getElementById("switch-btn").classList.contains("on");
  const nuevoEstado = !estaAbierto;
  const confirmMsg = nuevoEstado
    ? "¿Volver a abrir para recibir pedidos?"
    : "¿Cerrar y dejar de recibir pedidos nuevos?";
  if(!confirm(confirmMsg)) return;

  const { error } = await supabaseClient.from("config").update({ abierto: nuevoEstado, actualizado_en: new Date().toISOString() }).eq("id", 1);
  if(error){ console.error(error); alert("No se pudo actualizar. Intenta de nuevo."); return; }
  renderToggle(nuevoEstado);
}

cargarConfig();

supabaseClient
  .channel("config-realtime")
  .on("postgres_changes", { event: "*", schema: "public", table: "config" }, (payload) => {
    renderToggle(payload.new.abierto);
  })
  .subscribe();

/* ===================== Chat con clientes ===================== */

let conversacionActivaId = null;
let canalMensajesActivos = null;

function horaMsg(iso){
  return new Date(iso).toLocaleTimeString("es-CO", { hour:"2-digit", minute:"2-digit" });
}
function fechaCorta(iso){
  return new Date(iso).toLocaleDateString("es-CO", { day:"2-digit", month:"short" }) + " · " + horaMsg(iso);
}

async function cargarListaConversaciones(){
  const { data, error } = await supabaseClient
    .from("conversaciones")
    .select("*")
    .order("actualizado_en", { ascending: false });
  if(error){ console.error(error); return; }

  const totalNoLeidos = data.reduce((s,c) => s + (c.no_leidos_negocio || 0), 0);
  const btnBadge = document.getElementById("chat-btn-badge");
  if(totalNoLeidos > 0){
    btnBadge.textContent = totalNoLeidos;
    btnBadge.classList.remove("oculto");
  } else {
    btnBadge.classList.add("oculto");
  }

  const cont = document.getElementById("chat-lista-items");
  if(data.length === 0){
    cont.innerHTML = `<div id="chat-vacio-lista">Todavía no hay conversaciones</div>`;
    return;
  }
  cont.innerHTML = data.map(c => `
    <div class="conv-item ${c.id === conversacionActivaId ? 'activa' : ''}" onclick="abrirConversacion('${c.id}')">
      <div>
        <div class="conv-nombre">${c.cliente_nombre || "Cliente"}</div>
        <div class="conv-fecha">${fechaCorta(c.actualizado_en)}</div>
      </div>
      ${c.no_leidos_negocio > 0 ? `<div class="conv-badge">${c.no_leidos_negocio}</div>` : ""}
    </div>
  `).join("");
}

function abrirChatPanel(){
  document.getElementById("chat-overlay").classList.add("show");
  cargarListaConversaciones();
}
function cerrarChatPanel(){
  document.getElementById("chat-overlay").classList.remove("show");
}

async function abrirConversacionDesdeChatPanel(convId){
  document.getElementById("chat-overlay").classList.add("show");
  await cargarListaConversaciones();
  await abrirConversacion(convId);
}

async function abrirConversacion(convId){
  conversacionActivaId = convId;

  const { data: conv } = await supabaseClient.from("conversaciones").select("*").eq("id", convId).single();

  document.getElementById("chat-thread").innerHTML = `
    <div id="chat-thread-header">${conv?.cliente_nombre || "Cliente"}</div>
    <div id="chat-thread-mensajes"></div>
    <div id="chat-thread-input-fila">
      <input id="chat-thread-input" placeholder="Escribe una respuesta..." onkeydown="if(event.key==='Enter') enviarRespuesta();">
      <button id="chat-thread-enviar" onclick="enviarRespuesta()">Enviar</button>
    </div>
  `;

  await cargarMensajesConversacion(convId);
  await supabaseClient.from("conversaciones").update({ no_leidos_negocio: 0 }).eq("id", convId);
  cargarListaConversaciones();
  suscribirseAConversacion(convId);
}

async function cargarMensajesConversacion(convId){
  const { data, error } = await supabaseClient
    .from("mensajes")
    .select("*")
    .eq("conversacion_id", convId)
    .order("creado_en", { ascending: true });
  if(error){ console.error(error); return; }

  const cont = document.getElementById("chat-thread-mensajes");
  if(!cont) return;
  cont.innerHTML = data.map(m => `
    <div class="msg msg-${m.remitente}">
      ${m.texto}
      <div class="msg-hora">${horaMsg(m.creado_en)}</div>
    </div>
  `).join("");
  cont.scrollTop = cont.scrollHeight;
}

async function enviarRespuesta(){
  const input = document.getElementById("chat-thread-input");
  const texto = input.value.trim();
  if(!texto || !conversacionActivaId) return;
  input.value = "";

  const { error } = await supabaseClient.from("mensajes").insert({
    conversacion_id: conversacionActivaId,
    remitente: "negocio",
    texto: texto
  });
  if(error){ console.error(error); alert("No se pudo enviar la respuesta."); return; }
  await cargarMensajesConversacion(conversacionActivaId);
}

function suscribirseAConversacion(convId){
  if(canalMensajesActivos){
    supabaseClient.removeChannel(canalMensajesActivos);
  }
  canalMensajesActivos = supabaseClient
    .channel("chat-negocio-" + convId)
    .on("postgres_changes",
      { event: "INSERT", schema: "public", table: "mensajes", filter: `conversacion_id=eq.${convId}` },
      async (payload) => {
        await cargarMensajesConversacion(convId);
        if(payload.new.remitente === "cliente"){
          await supabaseClient.from("conversaciones").update({ no_leidos_negocio: 0 }).eq("id", convId);
        }
      }
    )
    .subscribe();
}

// Actualiza la lista y el contador general cada vez que cambia cualquier conversación
supabaseClient
  .channel("conversaciones-realtime")
  .on("postgres_changes", { event: "*", schema: "public", table: "conversaciones" }, () => {
    cargarListaConversaciones();
  })
  .subscribe();

cargarListaConversaciones();

/* ===================== Gestión del menú (pizzas y bebidas) ===================== */

let tabMenuAdminActual = "pizzas";

function abrirMenuAdmin(){
  document.getElementById("menu-admin-overlay").classList.add("show");
  cambiarTabMenuAdmin("pizzas");
}
function cerrarMenuAdmin(){
  document.getElementById("menu-admin-overlay").classList.remove("show");
}

function cambiarTabMenuAdmin(tab){
  tabMenuAdminActual = tab;
  document.getElementById("tab-pizzas").classList.toggle("activa", tab === "pizzas");
  document.getElementById("tab-bebidas").classList.toggle("activa", tab === "bebidas");
  document.getElementById("menu-admin-agregar").textContent = tab === "pizzas" ? "+ Agregar pizza nueva" : "+ Agregar bebida nueva";
  if(tab === "pizzas") cargarPizzasAdmin();
  else cargarBebidasAdmin();
}

function agregarItemNuevo(){
  if(tabMenuAdminActual === "pizzas") agregarPizzaNueva();
  else agregarBebidaNueva();
}

/* --- Pizzas --- */

async function cargarPizzasAdmin(){
  const { data, error } = await supabaseClient
    .from("pizzas")
    .select("*")
    .order("orden", { ascending: true });

  if(error){ console.error(error); return; }

  const cont = document.getElementById("menu-admin-lista");
  if(data.length === 0){
    cont.innerHTML = `<div style="text-align:center; color:rgba(242,233,216,0.4); font-size:13px;">Aún no hay pizzas. Agrega la primera abajo.</div>`;
    return;
  }

  cont.innerHTML = data.map(p => `
    <div class="pizza-admin-card" id="pizza-admin-${p.id}">
      ${p.foto_url
        ? `<img src="${p.foto_url}" class="pizza-admin-foto">`
        : `<div class="pizza-admin-foto-vacia">Sin foto</div>`}
      <div class="pizza-admin-campos">
        <input type="text" id="pa-nombre-${p.id}" value="${p.nombre || ""}" placeholder="Nombre">
        <textarea id="pa-desc-${p.id}" rows="2" placeholder="Descripción">${p.descripcion || ""}</textarea>
        <div class="pizza-admin-fila">
          <input type="number" id="pa-personal-${p.id}" value="${p.precio_personal ?? ""}" placeholder="Personal">
          <input type="number" id="pa-mediana-${p.id}" value="${p.precio_mediana ?? ""}" placeholder="Mediana">
          <input type="number" id="pa-grande-${p.id}" value="${p.precio_grande ?? ""}" placeholder="Grande">
        </div>
        <div class="pizza-admin-acciones">
          <button class="btn-mini guardar" onclick="guardarPizza(${p.id})">Guardar</button>
          <label>
            <input type="checkbox" ${p.activa ? "checked" : ""} onchange="toggleActivaPizza(${p.id}, this.checked)">
            Visible en el menú
          </label>
          <button class="btn-mini subir-foto" onclick="document.getElementById('pa-foto-input-${p.id}').click()">📷 Foto</button>
          <input type="file" id="pa-foto-input-${p.id}" accept="image/*" style="display:none" onchange="subirFotoPizza(${p.id}, this.files[0])">
          <button class="btn-mini borrar" onclick="eliminarPizza(${p.id})">Borrar</button>
        </div>
      </div>
    </div>
  `).join("");
}

async function guardarPizza(id){
  const nombre = document.getElementById(`pa-nombre-${id}`).value.trim();
  const descripcion = document.getElementById(`pa-desc-${id}`).value.trim();
  const precio_personal = parseFloat(document.getElementById(`pa-personal-${id}`).value) || null;
  const precio_mediana = parseFloat(document.getElementById(`pa-mediana-${id}`).value) || null;
  const precio_grande = parseFloat(document.getElementById(`pa-grande-${id}`).value) || null;

  const { error } = await supabaseClient.from("pizzas").update({
    nombre, descripcion, precio_personal, precio_mediana, precio_grande
  }).eq("id", id);

  if(error){ console.error(error); alert("No se pudo guardar. Intenta de nuevo."); return; }
  alert("Pizza actualizada ✓");
}

async function toggleActivaPizza(id, activa){
  const { error } = await supabaseClient.from("pizzas").update({ activa }).eq("id", id);
  if(error){ console.error(error); alert("No se pudo actualizar."); }
}

async function subirFotoPizza(id, file){
  if(!file) return;
  const extension = file.name.split(".").pop();
  const ruta = `pizza-${id}-${Date.now()}.${extension}`;

  const { error: errorSubida } = await supabaseClient.storage.from("pizzas").upload(ruta, file, {
    cacheControl: "3600",
    upsert: false
  });
  if(errorSubida){ console.error(errorSubida); alert("No se pudo subir la foto. Revisa que el bucket 'pizzas' exista en Supabase Storage."); return; }

  const { data: publicUrlData } = supabaseClient.storage.from("pizzas").getPublicUrl(ruta);
  const foto_url = publicUrlData.publicUrl;

  const { error: errorUpdate } = await supabaseClient.from("pizzas").update({ foto_url }).eq("id", id);
  if(errorUpdate){ console.error(errorUpdate); alert("La foto se subió pero no se pudo vincular a la pizza."); return; }

  cargarPizzasAdmin();
}

async function eliminarPizza(id){
  if(!confirm("¿Borrar esta pizza del menú? Esta acción no se puede deshacer.")) return;
  const { error } = await supabaseClient.from("pizzas").delete().eq("id", id);
  if(error){ console.error(error); alert("No se pudo borrar."); return; }
  cargarPizzasAdmin();
}

async function agregarPizzaNueva(){
  const { error } = await supabaseClient.from("pizzas").insert({
    nombre: "Nueva pizza",
    descripcion: "",
    precio_personal: null,
    precio_mediana: null,
    precio_grande: null,
    activa: true,
    orden: 999
  });

  if(error){ console.error(error); alert("No se pudo agregar la pizza."); return; }
  cargarPizzasAdmin();
}

  const ruta = `bebida-${id}-${Date.now()}.${extension}`;

  const { error: errorSubida } = await supabaseClient.storage.from("pizzas").upload(ruta, file, {

  });
  if(errorSubida){ console.error(errorSubida); alert("No se pudo subir la foto."); return; }

  const { data: publicUrlData } = supabaseClient.storage.from("pizzas").getPublicUrl(ruta);

  const { error: errorUpdate } = await supabaseClient.from("bebidas").update({ foto_url }).eq("id", id);
  if(errorUpdate){ console.error(errorUpdate); alert("La foto se subió pero no se pudo vincular."); return; }

async function eliminarBebida(id){

  const { error } = await supabaseClient.from("bebidas").delete().eq("id", id);
  if(error){ console.error(error); alert("No se pudo borrar."); return; }

async function agregarBebidaNueva(){

    activa: true,
    orden: 999

  if(error){ console.error(error); alert("No se pudo agregar la bebida."); return; }
